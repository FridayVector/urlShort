services:
  frontend:
    image: urlshortner_frontend:dev
    ports:
      - 5173:5173
    environment:
      VITE_ALLOWED_HOSTS: short.aprylypa.local
    links:
      - backend:backend
  backend:
    image: urlshortner_backend:dev
    ports:
      - 8000:8000
    environment:
      DEFAULT_URL_TTL: 20
      REDIS_URL: redis://database:6379/0
      REDIS_PASSWORD: <PASS>
      EXTERNAL_DOMAIN: http://short.aprylypa.local
    links:
      - db:database
  db:
    image: redis:latest
    ports:
      - 6379:6379
    volumes:
      - ./data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

  nginx:
    image: nginx:latest
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    links:
      - backend:backend
      - frontend:frontend

networks:
  urlshapp_net:
    driver: bridge
